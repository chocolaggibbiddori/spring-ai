server:
  port: 8080
logging:
  pattern:
    console: "%clr(%-5level){green} %clr(%logger.%M\\(\\)){cyan} %msg%n"
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG
spring:
  application:
    name: springai
  output:
    ansi:
      enabled: always
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB
  autoconfigure:
    exclude: org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  cassandra:
    local-datacenter: datacenter1
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
          no-store: true
          must-revalidate: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          temperature: 0.3
          max-tokens: 1000
      audio:
        transcription:
          options:
            language: ko
        speech:
          options:
            voice: alloy
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        table-name: chat_memory_vector_store
        dimensions: 1536
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
          cassandra:
            initialize-schema: true
            keyspace: spring_ai
            table: chat_memory
            time-to-live: 3600s
